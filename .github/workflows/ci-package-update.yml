name: CI Package Updates

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: '${{ github.repository_id }}-${{ github.ref_name }}'
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

# Use PAT instead of GITHUB_TOKEN to cause semantic-release to trigger tag pipeline when tag is created.
# 'Fine-grained token' repo permissions: Contents

jobs:
  package-update:
    name: Update packages
    uses: stairwaytowonderland/actions/.github/workflows/ci-package-update.yaml@v1
    secrets: inherit
