name: Conventional Commit Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  conventional-commit:
    name: Run Conventional Commit Check
    uses: stairwaytowonderland/actions/.github/workflows/conventional-commit.yaml@v1
    secrets: inherit
